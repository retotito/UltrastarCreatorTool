name: Build & Release (macOS)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:   # allow manual trigger

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Step 1: Build the Python backend sidecar on each architecture ───────────
  build-python-sidecar:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-12          # Intel (x86_64)
            target: x86_64-apple-darwin
          - os: macos-14          # Apple Silicon (arm64)
            target: aarch64-apple-darwin

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system deps (FFmpeg)
        run: brew install ffmpeg

      - name: Install Python deps
        run: |
          pip install --upgrade pip
          # Core deps
          pip install \
            fastapi==0.115.0 \
            "uvicorn[standard]==0.30.0" \
            python-multipart==0.0.9 \
            "librosa==0.10.2" \
            "numpy>=1.24.0" \
            mido==1.3.2 \
            pyphen==0.16.0 \
            "pydantic>=2.0.0" \
            pyinstaller
          # essentia — optional but needed to bundle SDL libs for macOS 26 compat
          pip install essentia || echo "essentia not available for this arch, skipping"

      - name: Build sidecar with PyInstaller
        run: |
          pyinstaller backend/backend.spec --distpath dist-backend

      - name: Rename binary for Tauri sidecar convention
        run: |
          mkdir -p sidecar-out
          cp dist-backend/backend sidecar-out/backend-${{ matrix.target }}
          chmod +x sidecar-out/backend-${{ matrix.target }}

      - name: Upload sidecar artifact
        uses: actions/upload-artifact@v4
        with:
          name: sidecar-${{ matrix.target }}
          path: sidecar-out/backend-${{ matrix.target }}
          retention-days: 1

  # ── Step 2: Assemble universal .app with Tauri ──────────────────────────────
  build-tauri:
    needs: build-python-sidecar
    runs-on: macos-14   # Apple Silicon runner can cross-compile universal

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Rust (stable) + universal target
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source "$HOME/.cargo/env"
          rustup target add x86_64-apple-darwin
          rustup target add aarch64-apple-darwin

      - name: Download ARM sidecar
        uses: actions/download-artifact@v4
        with:
          name: sidecar-aarch64-apple-darwin
          path: frontend/src-tauri/binaries

      - name: Download Intel sidecar
        uses: actions/download-artifact@v4
        with:
          name: sidecar-x86_64-apple-darwin
          path: frontend/src-tauri/binaries

      - name: Make sidecars executable
        run: |
          chmod +x frontend/src-tauri/binaries/backend-aarch64-apple-darwin
          chmod +x frontend/src-tauri/binaries/backend-x86_64-apple-darwin

      - name: Install npm deps
        run: |
          cd frontend
          npm ci

      - name: Build Tauri app (universal)
        run: |
          source "$HOME/.cargo/env"
          cd frontend
          npm run tauri build -- --target universal-apple-darwin

      - name: Upload .dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: UltrastarCreator-macOS-universal
          path: |
            frontend/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: warn
          retention-days: 30

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            frontend/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
